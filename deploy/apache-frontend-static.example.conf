# Site React (build do Vite) em /var/www/pizzaria/dist
# SSL com Certbot: certbot --apache -d seudominio.com -d www.seudominio.com
#
# O .htaccess do dist faz fallback para index.html — necessario para:
#   /mesa/TOKEN (QR do cliente), rotas do painel, F5 no navegador.
#
# <VirtualHost *:443>
#   ServerName seudominio.com
#   ServerAlias www.seudominio.com
#   DocumentRoot /var/www/pizzaria/dist
#   SSLEngine on
#   # Certbot preenche SSLCertificateFile / SSLCertificateKeyFile
#
#   <Directory /var/www/pizzaria/dist>
#     Options -Indexes +FollowSymLinks
#     AllowOverride All
#     Require all granted
#   </Directory>
# </VirtualHost>
