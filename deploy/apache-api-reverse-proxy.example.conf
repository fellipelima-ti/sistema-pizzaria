# Exemplo: subdominio api.seudominio.com -> Node na porta 3333 (Apache + mod_proxy)
# Ajuste caminhos e dominio. Ative: a2enmod proxy proxy_http ssl (se HTTPS)
#
# <VirtualHost *:443>
#   ServerName api.seudominio.com
#   SSLEngine on
#   SSLCertificateFile /caminho/fullchain.pem
#   SSLCertificateKeyFile /caminho/privkey.pem
#
#   ProxyPreserveHost On
#   ProxyPass / http://127.0.0.1:3333/
#   ProxyPassReverse / http://127.0.0.1:3333/
# </VirtualHost>
