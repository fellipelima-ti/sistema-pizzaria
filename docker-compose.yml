services:
  postgres:
    image: postgres:16-alpine
    container_name: pizzaria-postgres
    environment:
      POSTGRES_DB: pizzaria
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pizzaria_pg_data:/var/lib/postgresql/data

volumes:
  pizzaria_pg_data:
